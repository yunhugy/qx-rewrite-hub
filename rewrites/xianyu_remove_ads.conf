# 闲鱼 App 去广告（Quantumult X）

[rewrite_local]
# 拦截闲鱼常见接口，交给脚本清洗 JSON 内广告字段/广告卡片
^https?:\/\/((acs|api|h5api|gw)\.)?(idlefish|goofish)\.(taobao|com)\/.* url script-response-body https://raw.githubusercontent.com/yunhugy/qx-rewrite-hub/main/scripts/xianyu_remove_ads_qx.js

[mitm]
hostname = *.idlefish.taobao.com, idlefish.taobao.com, *.goofish.com, goofish.com, acs.m.goofish.com, h5api.m.goofish.com
