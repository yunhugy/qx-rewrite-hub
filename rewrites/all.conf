hostname = *

# >>> dingding-smart.conf
^https?:\/\/[^\/]+\/(?:.+\/)?(?:ad|ads|advert|advertise|advertisement)(?:[\/\?].*)?$ url reject-dict
^https?:\/\/[^\/]+\/(?:.+\/)?(?:splash|startup|launch|boot|opening)(?:[\/\?].*)?$ url reject-dict
^https?:\/\/[^\/]+\/(?:.+\/)?(?:popup|popad|promotion|promo|recommend|banner)(?:[\/\?].*)?$ url reject-dict
^https?:\/\/[^\/]+\/(?:.+\/)?(?:notice|bulletin|activity|activities|campaign)(?:[\/\?].*)?$ url reject-dict
^https?:\/\/[^\/]+\/.*(?:adconfig|adsdk|advert_config|startup_config|splash_config).*$ url reject-dict
^https?:\/\/[^\/]+\/.*(?:adimage|ad_img|banner_image|splash_image|launch_image).*$ url reject-img
^https?:\/\/[^\/]+\/.*(?:tracking|tracker|analytics|metrics|promotion\/report).*$ url reject
# <<< dingding-smart.conf
