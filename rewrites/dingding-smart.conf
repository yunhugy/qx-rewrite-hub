# NAME: 叮叮智能去广告
# AUTHOR: Minis
# DESC: 叮叮智能（com.lancens.wxdoorbell）去广告实验版，优先拦截常见广告/开屏/推广接口
# STATUS: experimental
# BUNDLE: com.lancens.wxdoorbell
# UPDATED: 2026-04-11
#
# 使用说明：
# 1. 这是实验版规则，适合先行部署到仓库后持续迭代
# 2. 当前未拿到完整抓包数据，因此规则以常见广告路径关键字拦截为主
# 3. 如果出现误伤，可逐条注释后回测
#
# 建议在 Quantumult X 中作为 rewrite_remote 引用
# https://raw.githubusercontent.com/yunhugy/qx-rewrite-hub/main/rewrites/dingding-smart.conf
#
# 如后续抓到更准确域名，可把 hostname 改成精确域名列表
hostname = *

# === 常见广告/开屏/推广接口拦截（保守实验版） ===
^https?:\/\/[^\/]+\/(?:.+\/)?(?:ad|ads|advert|advertise|advertisement)(?:[\/\?].*)?$ url reject-dict
^https?:\/\/[^\/]+\/(?:.+\/)?(?:splash|startup|launch|boot|opening)(?:[\/\?].*)?$ url reject-dict
^https?:\/\/[^\/]+\/(?:.+\/)?(?:popup|popad|promotion|promo|recommend|banner)(?:[\/\?].*)?$ url reject-dict
^https?:\/\/[^\/]+\/(?:.+\/)?(?:notice|bulletin|activity|activities|campaign)(?:[\/\?].*)?$ url reject-dict

# === 常见广告配置文件拦截 ===
^https?:\/\/[^\/]+\/.*(?:adconfig|adsdk|advert_config|startup_config|splash_config).*$ url reject-dict

# === 常见图片/横幅广告资源 ===
^https?:\/\/[^\/]+\/.*(?:adimage|ad_img|banner_image|splash_image|launch_image).*$ url reject-img

# === 常见统计/营销上报（谨慎） ===
# 如影响消息推送或设备事件上报，可注释下面规则
^https?:\/\/[^\/]+\/.*(?:tracking|tracker|analytics|metrics|promotion\/report).*$ url reject

# === 预留：拿到抓包后在此补精确规则 ===
# ^https?:\/\/api\.example\.com\/app\/ad\/list url reject-dict
# ^https?:\/\/api\.example\.com\/app\/splash url reject-dict
# ^https?:\/\/api\.example\.com\/app\/banner url reject-array
